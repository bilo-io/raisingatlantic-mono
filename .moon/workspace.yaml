# .moon/workspace.yml
$schema: 'https://moonrepo.dev/schemas/workspace.json'

projects:
  # Apps
  api: 'src/apps/api'
  web: 'src/apps/web'
  mobile: 'src/apps/mobile'
  
  # Packages
  ui: 'src/pkgs/ui'
  
  # Tests
  cypress: 'src/test/cypress'
  postman: 'src/test/postman'
  
  # Workspace Root Tasks
  core: '.'
  tests: 'tests'

vcs:
  defaultBranch: 'master'
  provider: 'github'