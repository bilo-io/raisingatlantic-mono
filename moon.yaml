project:
  name: core
  description: 'Shared Workspace root project'

tasks:
  install:
    deps:
      - 'api:install'
      - 'web:install'
      - 'ui:install'
      - 'mobile:install'
      - 'cypress:install'
      - 'postman:install'

  build:
    deps:
      - 'api:build'
      - 'web:build'
      - 'ui:build'
      - 'mobile:build'

  deploy-test:
    script: |
      echo "========================================"
      echo "🚜 DEPLOYING TO TEST ENVIRONMENT"
      echo "========================================"
      git stash push -u -m "Pre-deploy to test"
      git checkout test
      git merge dev
      git push origin test
      git checkout dev
      (git stash pop || echo "No changes to restore.")
      echo "========================================"
      echo "✅ TEST DEPLOYMENT COMPLETE"
      echo "========================================"
    options:
      runInCI: false

  deploy-prod:
    script: |
      echo "========================================"
      echo "🚀 DEPLOYING TO PRODUCTION ENVIRONMENT"
      echo "========================================"
      git stash push -u -m "Pre-deploy to main"
      git checkout main
      git merge dev
      git push origin main
      git checkout dev
      (git stash pop || echo "No changes to restore.")
      echo "========================================"
      echo "✅ PRODUCTION DEPLOYMENT COMPLETE"
      echo "========================================"
    options:
      runInCI: false

  dev:
    deps:
      - 'api:dev'
      - 'web:dev'
      - 'mobile:dev'
    options:
      runInCI: false

  lint:
    deps:
      - 'api:lint'
      - 'web:lint'
      - 'mobile:lint'

  test:
    deps:
      - 'api:test'
      - 'web:test'
      - 'mobile:test'
      - 'tests:test'
      - 'cypress:test'

  clean:
    deps:
      - 'api:clean'
      - 'web:clean'
      - 'ui:clean'
      - 'mobile:clean'

  db-start:
    deps:
      - 'api:db-start'

  db-stop:
    deps:
      - 'api:db-stop'

  db-migrate:
    deps:
      - 'api:db-migrate'

  db-seed:
    deps:
      - 'api:db-seed'