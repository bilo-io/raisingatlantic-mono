project:
  name: 'core'
  description: 'Shared Workspace root project'

tasks:
  install:
    deps:
      - 'api:install'
      - 'web:install'
      - 'ui:install'
      - 'mobile:install'
      - 'cypress:install'
      - 'postman:install'

  build:
    deps:
      - 'api:build'
      - 'web:build'
      - 'ui:build'
      - 'mobile:build'

  dev:
    deps:
      - 'api:dev'
      - 'web:dev'
      - 'mobile:dev'
    options:
      runInCI: false

  lint:
    deps:
      - 'api:lint'
      - 'web:lint'
      - 'mobile:lint'

  test:
    deps:
      - 'api:test'
      - 'web:test'
      - 'mobile:test'
      - 'tests:test'
      - 'cypress:test'

  clean:
    deps:
      - 'api:clean'
      - 'web:clean'
      - 'ui:clean'
      - 'mobile:clean'

  db-start:
    deps:
      - 'api:db-start'

  db-stop:
    deps:
      - 'api:db-stop'

  db-migrate:
    deps:
      - 'api:db-migrate'

  db-seed:
    deps:
      - 'api:db-seed'

  deploy-test:
    script: 'git stash push -u -m "Auto-deploy to test" && git checkout test && git merge dev && git push origin test && git checkout dev && (git stash pop || true)'
    options:
      runInCI: false

  deploy-prod:
    script: 'git stash push -u -m "Auto-deploy to main" && git checkout main && git merge dev && git push origin main && git checkout dev && (git stash pop || true)'
    options:
      runInCI: false
