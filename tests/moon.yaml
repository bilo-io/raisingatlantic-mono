$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: 'tests'
  description: 'Workspace-level test orchestration'

tasks:
  test:
    # Delegates to postman-tests for local API validation.
    # Run individual suites via: moon run postman-tests:test-local etc.
