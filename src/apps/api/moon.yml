$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: 'api'
  description: 'Raising Atlantic API'

tasks:
  # --- Shared Tasks ---
  install:
    command: 'npm install'
    options:
      runInCI: false

  # --- API Tasks (NestJS) ---
  build:
    command: 'npm run build'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
    outputs:
      - 'dist'

  build-api:
    command: 'nest build'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
    outputs:
      - 'dist'
    options:
      cache: true

  dev:
    command: 'npm run dev'

  dev-api:
    command: 'nest start --watch'
    
  clean:
    command: 'rm -rf dist node_modules'

