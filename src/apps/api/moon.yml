$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: 'api'
  description: 'Raising Atlantic API'

tasks:
  # --- Shared Tasks ---
  install:
    command: 'npm install'

  # --- API Tasks (NestJS) ---
  build:
    command: 'npm run build'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
    outputs:
      - 'dist'

  build-api:
    command: 'npm run build'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
    outputs:
      - 'dist'
    options:
      cache: true

  dev:
    command: 'npm run dev'

  dev-api:
    command: 'npm run dev'
    
  db-start:
    command: 'npm run db:start'
    
  db-stop:
    command: 'npm run db:stop'
    
  db-migrate:
    command: 'npm run db:migration:run'
    
  db-seed:
    command: 'npm run db:seed'

  clean:
    command: 'rm -rf dist node_modules'

