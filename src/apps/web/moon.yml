$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: 'raising-atlantic'
  description: 'Raising Atlantic Web App'

tasks:
  install:
    command: 'npm install --legacy-peer-deps'

  build:
    command: 'npm run build'
    inputs:
      - 'src/**/*'
      - 'public/**/*'
      - 'next.config.*'
      - 'tsconfig.json'
    outputs:
      - '.next'

  dev:
    command: 'npm run dev'
    
  clean:
    command: 'rm -rf .next node_modules'

  lint:
    command: 'eslint .'
    inputs:
      - '**/*.{js,ts,html}'
    
  test:
    command: 'jest'
    inputs:
      - 'src/**/*'
      - 'test/**/*'