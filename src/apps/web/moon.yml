$schema: 'https://moonrepo.dev/schemas/project.json'

project:
  name: 'api'
  description: 'Raising Atlantic API'

tasks:
  install:
    command: 'npm install'

  dev:
    command: 'moon run :dev-web'
    
  dev-web:
    command: 'npx serve . -p 8000'
    options:
      runInCI: false

  # --- Global Quality Control ---
  lint:
    command: 'eslint .'
    inputs:
      - '**/*.{js,ts,html}'
    
  test:
    command: 'jest'
    inputs:
      - 'src/**/*'
      - 'test/**/*'