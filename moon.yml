project:
  name: raising-atlantic-mono
  
tasks:
  install:
    deps:
      - 'api:install'
      - 'web:install'
      - 'ui:install'

  build:
    deps:
      - 'api:build'
      - 'web:build'
      - 'ui:build'

  dev:
    deps:
      - 'api:dev'
      - 'web:dev'
    options:
      runInCI: false

  lint:
    deps:
      - 'api:lint'
      - 'web:lint'

  test:
    deps:
      - 'api:test'
      - 'web:test'
      - 'tests:test'

  clean:
    deps:
      - 'api:clean'
      - 'web:clean'
      - 'ui:clean'

  db:start:
    deps:
      - 'api:db-start'

  db:stop:
    deps:
      - 'api:db-stop'

  db:migrate:
    deps:
      - 'api:db-migrate'

  db:seed:
    deps:
      - 'api:db-seed'
